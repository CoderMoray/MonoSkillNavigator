services:
  postgres:
    image: postgres:16-alpine
    container_name: skill-platform-postgres
    environment:
      POSTGRES_DB: skill_platform
      POSTGRES_USER: skill_platform
      POSTGRES_PASSWORD: skill_platform
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skill_platform -d skill_platform"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: skill-platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: skill_platform
      MINIO_ROOT_PASSWORD: skill_platform_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  minio-data:
